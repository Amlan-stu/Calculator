<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Calculator</title>
    <link rel="stylesheet" href="calc.css">
</head>
<body>
    
    <div class="Calculator"><input type="text" placeholder="0" id="inputBox" readonly>
    </div>
    <div class="first">
        <button class="opr_ac">AC</button>
        <button class="opr_del">DEL</button>
        <button class="opr">%</button>
        <button class="opr">/</button>
    </div>

  <div>
    <button>7</button>
    <button>8</button>
    <button>9</button>
    <button class="opr">*</button>
  </div>

 <div>
    <button>4</button>
    <button>5</button>
    <button>6</button>
    <button class="opr">-</button>
  </div>

 <div>
    <button>1</button>
    <button>2</button>
    <button>3</button>
    <button class="opr">+</button>
  </div>

 <div>
    <button>00</button>
    <button>0</button>
    <button>.</button>
    <button class="equl_btn">=</button>
  </div>




    <script src="calc.js"></script>
</body>
</html>
